<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Scholars College Trip Media</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-elon bg-light d-flex flex-column min-vh-100">

    <header class="py-5 text-white shadow-sm transition-base">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">2026 SEO Scholars College Tour Photo Library</h1>
            <p class="lead opacity-75 mb-0">Capture and share your college tour moments!</p>
        </div>
    </header>

    <div class="container my-5 flex-grow-1">

        <nav class="college-tabs d-flex justify-content-center flex-wrap gap-2 mb-4">
            <button class="btn tab-btn px-4 py-2 rounded-pill fw-bold" data-college="elon" id="tab-elon">Elon
                University</button>
            <button class="btn tab-btn locked px-4 py-2 rounded-pill fw-bold" data-college="app_state"
                id="tab-app">Appalachian State 🔒</button>
            <button class="btn tab-btn locked px-4 py-2 rounded-pill fw-bold" data-college="unc" id="tab-unc">UNC Chapel
                Hill 🔒</button>
        </nav>

        <main class="upload-container mx-auto" style="max-width: 600px;">
            <div class="card border-0 shadow-sm p-4 mb-4 text-center">
                <div id="dropZone"
                    class="drop-zone border border-2 border-dashed rounded-3 py-5 px-3 bg-white cursor-pointer transition-base">
                    <div id="dropZoneContent">
                        <div class="fs-1 mb-2">📷</div>
                        <p class="fs-5 fw-semibold text-secondary mb-1">Tap to choose photos</p>
                        <p class="small text-muted mb-0">or drag & drop them here</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                </div>

                <button id="uploadBtn" class="btn btn-lg w-100 mt-3 text-white fw-bold shadow-sm"
                    style="display: none;">
                    Upload to <span id="current-upload-target">Elon</span>
                </button>

                <div id="uploadProgress" class="mt-3 text-start" style="display: none;">
                    <p id="progressText" class="small fw-semibold text-muted mb-2">Processing...</p>
                    <div class="progress" style="height: 12px;">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated text-white"
                            role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </main>

        <section id="gallerySection" class="card border-0 shadow-sm p-4 mb-5 text-center" style="display: none;">
            <h2 id="galleryTitle" class="h3 fw-bold mb-4 text-start border-bottom pb-2">Elon Gallery</h2>
            <div class="sushi-wrap position-relative overflow-hidden mx-auto my-3" id="sushiWrap">
                <div class="sushi-track d-flex transition-base" id="sushiTrack"></div>
            </div>
            <div class="carousel-controls d-flex justify-content-center align-items-center gap-3 mt-4">
                <button id="prevBtn" class="btn btn-outline-secondary rounded-circle shadow-sm px-3 py-2">◀</button>
                <span id="slideCounter" class="badge bg-dark px-3 py-2 fs-6 rounded-pill fw-semibold"></span>
                <button id="nextBtn" class="btn btn-outline-secondary rounded-circle shadow-sm px-3 py-2">▶</button>
            </div>
        </section>

        <section id="downloadSection"
            class="advisor-panel card border-0 border-start border-4 border-warning shadow-sm p-4 mx-auto text-center"
            style="max-width: 600px;">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                <span class="fs-4">💼</span>
                <h3 class="h4 fw-bold mb-0">Download All Pictures</h3>
            </div>
            <button id="downloadBtn" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm mb-2">
                Download All Colleges Pictures (ZIP)
            </button>
            <p id="downloadStatus" class="small text-muted mb-0" style="display: none;"></p>
        </section>

    </div>

    <footer class="py-4 bg-white border-top text-muted mt-auto text-center">
        <div class="container">
            <p class="small mb-0">BuiltByKristian for SEO Scholars · 2026</p>
        </div>
    </footer>

    <div id="toast"
        class="toast position-fixed bottom-0 start-50 translate-middle-x mb-4 bg-dark text-white p-3 rounded-pill shadow fs-6 text-center z-3"
        style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
